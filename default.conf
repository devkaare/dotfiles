[global]

chord_timeout = 200

[ids]

*

[main]

# Maps capslock to escape when pressed and control when held.
capslock = overload(control, esc)

# Remaps the escape key to capslock
esc = capslock

# Maps leftalt and capslock (control or esc) to right alt (alt gr)
leftalt+leftshift = rightalt

leftshift+leftalt = rightalt
